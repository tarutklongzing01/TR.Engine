<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ - TR REMAP</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0b1220;
      --panel:#121c2f;
      --panel2:#0f1728;
      --border:#263755;
      --text:#f8fafc;
      --muted:#94a3b8;
      --blue:#4f8cff;
      --blue2:#3b82f6;
      --green:#22c55e;
      --red:#ef4444;
      --shadow:0 18px 40px rgba(0,0,0,.32);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      visibility:visible;
      font-family:'Kanit',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(79,140,255,.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34,197,94,.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .auth-shell{
      width:100%;
      max-width:1080px;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      background:linear-gradient(180deg, rgba(18,28,47,.94), rgba(10,18,32,.96));
      border:1px solid var(--border);
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .auth-left{
      padding:42px 34px;
      background:
        radial-gradient(circle at top left, rgba(79,140,255,.18), transparent 26%),
        linear-gradient(180deg, rgba(15,23,40,.96), rgba(10,18,32,.98));
      border-right:1px solid rgba(255,255,255,.05);
    }

    .auth-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(79,140,255,.28);
      background:rgba(79,140,255,.12);
      color:#cfe0ff;
      font-size:13px;
      font-weight:600;
      margin-bottom:18px;
    }

    .auth-left h1{
      margin:0 0 10px;
      font-size:38px;
      line-height:1.15;
    }

    .auth-left p{
      margin:0;
      color:var(--muted);
      line-height:1.8;
      font-size:15px;
      max-width:520px;
    }

    .update-list{
      display:grid;
      gap:12px;
      margin-top:28px;
    }

    .update-card{
      padding:15px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.05);
      transition:.18s ease;
    }

    .update-card:hover{
      transform:translateY(-1px);
      border-color:rgba(79,140,255,.20);
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }

    .update-head{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .update-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(180deg, var(--blue), #7fb2ff);
      box-shadow:0 0 14px rgba(79,140,255,.45);
      flex:0 0 12px;
    }

    .update-version{
      font-size:15px;
      font-weight:700;
      color:#ffffff;
    }

    .update-date{
      font-size:12px;
      color:#a9bad6;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(79,140,255,.08);
      border:1px solid rgba(79,140,255,.14);
    }

    .update-card p{
      margin:0;
      font-size:13px;
      line-height:1.7;
      color:var(--muted);
    }

    .auth-right{
      padding:34px 28px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(18,28,47,.9), rgba(12,20,34,.95));
    }

    .auth-card{
      width:100%;
      max-width:420px;
    }

    .brand{
      text-align:center;
      margin-bottom:20px;
    }

    .brand h2{
      margin:0;
      font-size:28px;
    }

    .brand p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .auth-tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:0 0 22px;
    }

    .auth-tabs a{
      text-decoration:none;
    }

    .auth-tabs button{
      width:100%;
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 14px;
      font-family:inherit;
      font-size:14px;
      font-weight:600;
      color:var(--text);
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      transition:.18s ease;
    }

    .auth-tabs button.active{
      background:rgba(79,140,255,.16);
      border-color:rgba(79,140,255,.32);
      color:#dce9ff;
    }

    .auth-tabs button:hover,
    .google-btn:hover,
    .btn:hover{
      transform:translateY(-1px);
    }

    .msg{
      margin:0 0 14px;
      padding:13px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
      text-align:center;
      min-height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .msg.success{
      color:#d1fae5;
      background:rgba(34,197,94,.12);
      border-color:rgba(34,197,94,.22);
    }

    .msg.error{
      color:#fecaca;
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.22);
    }

    .google-btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:15px 16px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      font-family:inherit;
      font-size:15px;
      font-weight:600;
      background:#fff;
      color:#111827;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
      transition:.18s ease;
    }

    .google-icon{
      width:20px;
      height:20px;
      display:block;
    }

    .auth-divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:18px 0;
      color:var(--muted);
      font-size:13px;
    }

    .auth-divider::before,
    .auth-divider::after{
      content:"";
      flex:1;
      height:1px;
      background:rgba(255,255,255,.1);
    }

    .field{
      margin-bottom:16px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-size:14px;
      font-weight:500;
      color:#dbe7ff;
    }

    .field input{
      width:100%;
      border:1px solid var(--border);
      background:var(--panel2);
      color:var(--text);
      outline:none;
      border-radius:16px;
      padding:14px 15px;
      font-family:inherit;
      font-size:15px;
      transition:.18s ease;
    }

    .field input:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(79,140,255,.14);
    }

    .btn{
      width:100%;
      border:none;
      cursor:pointer;
      border-radius:18px;
      padding:15px 16px;
      font-family:inherit;
      font-size:15px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(180deg, var(--blue), var(--blue2));
      box-shadow:0 12px 26px rgba(79,140,255,.28);
      transition:.18s ease;
    }

    .bottom-note{
      text-align:center;
      margin-top:16px;
      color:var(--muted);
      font-size:14px;
    }

    .bottom-note a{
      color:#dce9ff;
      text-decoration:none;
      font-weight:600;
    }

    @media (max-width: 900px){
      .auth-shell{
        grid-template-columns:1fr;
      }

      .auth-left{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-left">
      <div class="auth-badge">Update Notes</div>
      <h1>อัปเดตเว็บไซต์<br>Engine Calculator Pro</h1>
      <p>
        ติดตามการเปลี่ยนแปลงของระบบ เวอร์ชันล่าสุด และฟีเจอร์ใหม่
        เพื่อให้ใช้งานได้สะดวก รวดเร็ว และเสถียรมากยิ่งขึ้น
      </p>

      <div id="updateList" class="update-list"></div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="brand">
          <h2>เข้าสู่ระบบ</h2>
          <p>ยินดีต้อนรับกลับ</p>
        </div>

        <div class="auth-tabs">
          <a href="login.html"><button class="active" type="button">เข้าสู่ระบบ</button></a>
          <a href="register.html"><button type="button">สมัครสมาชิก</button></a>
        </div>

        <div id="authMessage" class="msg">พร้อมเข้าสู่ระบบแล้ว</div>

        <button id="googleBtn" class="google-btn" type="button">
          <svg class="google-icon" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.651 32.657 29.24 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
            <path fill="#4CAF50" d="M24 44c5.177 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.143 35.091 26.715 36 24 36c-5.219 0-9.617-3.318-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.793 2.238-2.231 4.166-4.084 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
          </svg>
          เข้าสู่ระบบด้วย Google
        </button>

        <div class="auth-divider">หรือเข้าสู่ระบบด้วยอีเมล</div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="loginEmail">อีเมล</label>
            <input id="loginEmail" type="email" placeholder="example@mail.com" autocomplete="email">
          </div>

          <div class="field">
            <label for="loginPassword">รหัสผ่าน</label>
            <input id="loginPassword" type="password" placeholder="กรอกรหัสผ่านของคุณ" autocomplete="current-password">
          </div>

          <button id="loginBtn" class="btn" type="submit">เข้าสู่ระบบ</button>
        </form>

        <div class="bottom-note">
          ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const updateData = [
      {
        version: "Version 1.0.5",
        date: "16 มี.ค. 2026",
        detail: "เพิ่มระบบเข้าสู่ระบบด้วย Google และปรับการแสดงผลหน้าเข้าสู่ระบบให้ใช้งานง่ายขึ้น"
      },
      {
        version: "Version 1.0.4",
        date: "14 มี.ค. 2026",
        detail: "ปรับปรุงระบบตรวจสอบสถานะผู้ใช้ ลดปัญหาหน้าเด้งวน และเพิ่มความเสถียรในการโหลดหน้า"
        
      },
      {
        version: "Version 1.0.3",
        date: "10 มี.ค. 2026",
        detail: "อัปเกรดหน้าเข้าสู่ระบบใหม่ ปรับดีไซน์ให้ทันสมัย รองรับมือถือ และแยกปุ่มเข้าสู่ระบบกับสมัครสมาชิกชัดเจน"
      }
    ];

    function renderUpdates() {
      const updateList = document.getElementById("updateList");
      if (!updateList) return;

      updateList.innerHTML = updateData.map(item => `
        <div class="update-card">
          <div class="update-head">
            <div class="update-dot"></div>
            <div class="update-version">${item.version}</div>
            <div class="update-date">${item.date}</div>
          </div>
          <p>${item.detail}</p>
        </div>
      `).join("");
    }

    renderUpdates();
  </script>

  <script type="module" src="./auth.js"></script>
</body>
</html>
