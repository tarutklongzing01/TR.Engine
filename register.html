<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สมัครสมาชิก - TR REMAP</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-shell">
    <div class="auth-card">
      
      <h2 style="text-align: center; margin: 10px 0 8px;">สมัครสมาชิก</h2>
      <div class="subtitle" style="text-align: center; margin-bottom: 24px; font-size: 14px;">
        สร้างบัญชีเพื่อเริ่มต้นใช้งานระบบ
      </div>

      <div class="auth-tabs" style="margin-bottom: 30px;">
        <button onclick="location.href='login.html'">เข้าสู่ระบบ</button>
        <button class="active" onclick="location.href='register.html'">สมัครสมาชิก</button>
      </div>

      <div class="field">
        <label>ชื่อที่แสดง</label>
        <input id="regDisplayName" type="text" placeholder="เช่น Tarutserway" required>
      </div>

      <div class="field">
        <label>อีเมล</label>
        <input id="regEmail" type="email" placeholder="example@mail.com" required>
      </div>

      <div class="field">
        <label>รหัสผ่าน</label>
        <input id="regPassword" type="password" placeholder="อย่างน้อย 6 ตัวอักษร" required>
      </div>

      <div class="field" style="margin-bottom: 28px;">
        <label>ยืนยันรหัสผ่าน</label>
        <input id="regConfirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
      </div>

      <button class="btn success" style="width:100%; padding: 16px; font-size: 16px; border-radius: 18px;" onclick="registerMember()">
        สร้างบัญชีผู้ใช้งาน
      </button>

      <div class="msg" id="authMessage" style="text-align: center; margin-top: 20px;">
        ระบบจะพาไปหน้าหลักอัตโนมัติหลังสมัครสมาชิก
      </div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
